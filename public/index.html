<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTT — Login</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>YTT</h1>
      <p class="subtitle">YouTube Transcriber Tool</p>

      <div id="error-banner" class="alert alert-error hidden" role="alert">
        Invalid password. Please try again.
      </div>

      <form method="POST" action="/login" id="login-form">
        <div class="field">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            autofocus
            required
          />
        </div>
        <button type="submit" class="btn" id="submit-btn">Sign in</button>
      </form>
    </div>
  </div>

  <script>
    // Show error banner if server sent us back to the login page (failed auth)
    // The server re-serves this page on failure; check if we arrived via POST
    // by looking at the navigation type.
    const nav = performance.getEntriesByType('navigation')[0];
    if (nav && nav.type === 'back_forward') {
      // ignore back nav
    } else if (document.referrer && document.referrer.includes('/login') || window.location.search.includes('error')) {
      document.getElementById('error-banner').classList.remove('hidden');
    }

    // Detect POST redirect (browser navigated here after a form POST)
    if (window.performance && window.performance.navigation) {
      if (window.performance.navigation.type === 0 && document.referrer.endsWith('/login')) {
        document.getElementById('error-banner').classList.remove('hidden');
      }
    }

    document.getElementById('login-form').addEventListener('submit', function() {
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
    });
  </script>
</body>
</html>
